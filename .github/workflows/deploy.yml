name: Build and Deploy Hugo to GH Pages
on:
  push:
    branches:
      - main  # Change to "master" if your default branch uses the old naming convention
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true  # Fetch Hugo themes if they are added as submodules
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod features
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true    # Set to true if your theme requires Hugo Extended (SASS/SCSS support)
      - name: Build Hugo Site
        run: hugo --minify
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
