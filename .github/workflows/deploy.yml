name: Build and Deploy Hugo to GH Pages
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Grants permission to push to the gh-pages branch
      pages: write       # Needed if utilizing native GitHub Pages deployments
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true  # Fetches your ananke theme submodule
          fetch-depth: 0    # Fetches all history
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true    # Important for themes like Ananke that process SCSS
      - name: Build Hugo Site
        run: hugo --minify -d public   # Forces the output directory into 'public'
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages

